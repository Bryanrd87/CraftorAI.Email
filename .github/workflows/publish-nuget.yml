name: Publish NuGet Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Set package version
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Restore
        run: dotnet restore

      - name: Pack
        run: dotnet pack ./CraftorAI.Email.csproj -c Release -o ./nupkg -p:PackageVersion=${{ env.PACKAGE_VERSION }}

      - name: Publish
        run: dotnet nuget push "./nupkg/*.nupkg" --source "https://nuget.pkg.github.com/Bryanrd87/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
